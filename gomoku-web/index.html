<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gomoku 2D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #3a3a3a;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #game {
      position: fixed;
      inset: 0;
      overflow: hidden;
      touch-action: none;
    }
    #game canvas { display: block; }
  </style>
</head>
<body>
  <div id="game"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
