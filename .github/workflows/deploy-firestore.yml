name: Deploy Firestore rules

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: firestore-rules
  cancel-in-progress: false

jobs:
  deploy:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_FIRESTORE_DEPLOY_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Deploy Firestore rules
        id: deploy
        run: |
          set -euo pipefail

          TOKEN="${{ steps.auth.outputs.access_token }}"
          RULESET_BODY=$(jq -n --rawfile rules firestore.rules \
            '{source:{files:[{name:"firestore.rules", content:$rules}]}}')

          RULESET_RESPONSE=$(curl -fsS -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            "https://firebaserules.googleapis.com/v1/projects/gomoku2d/rulesets" \
            -d "${RULESET_BODY}")

          RULESET_NAME=$(printf '%s\n' "${RULESET_RESPONSE}" | jq -r '.name')
          if [[ ! "${RULESET_NAME}" =~ ^projects/gomoku2d/rulesets/ ]]; then
            echo "::error::Ruleset creation failed: ${RULESET_RESPONSE}"
            exit 1
          fi

          PREVIOUS_RESPONSE=$(curl -fsS \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://firebaserules.googleapis.com/v1/projects/gomoku2d/releases/cloud.firestore")
          PREVIOUS_RULESET=$(printf '%s\n' "${PREVIOUS_RESPONSE}" | jq -r '.rulesetName')

          curl -fsS -X PATCH \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            "https://firebaserules.googleapis.com/v1/projects/gomoku2d/releases/cloud.firestore" \
            -d "{\"release\":{\"name\":\"projects/gomoku2d/releases/cloud.firestore\",\"rulesetName\":\"${RULESET_NAME}\"},\"updateMask\":\"rulesetName\"}" \
            >/dev/null

          VERIFY_RESPONSE=$(curl -fsS \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://firebaserules.googleapis.com/v1/projects/gomoku2d/releases/cloud.firestore")
          LIVE_RULESET=$(printf '%s\n' "${VERIFY_RESPONSE}" | jq -r '.rulesetName')

          if [ "${LIVE_RULESET}" != "${RULESET_NAME}" ]; then
            echo "::error::Live Firestore release points at ${LIVE_RULESET}, expected ${RULESET_NAME}"
            exit 1
          fi

          echo "ruleset=${RULESET_NAME}" >> "${GITHUB_OUTPUT}"
          {
            echo "### Firestore rules deployed"
            echo
            echo "- Previous ruleset: \`${PREVIOUS_RULESET}\`"
            echo "- Deployed ruleset: \`${RULESET_NAME}\`"
            echo "- Release: \`projects/gomoku2d/releases/cloud.firestore\`"
            echo "- Source ref: \`${GITHUB_REF}\`"
            echo "- Source SHA: \`${GITHUB_SHA}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
