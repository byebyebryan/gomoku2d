version: 2
updates:
  - package-ecosystem: cargo
    directory: /gomoku-bot-lab
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: npm
    directory: /gomoku-web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      react:
        patterns:
          - react
          - react-dom
          - react-router-dom
          - "@types/react*"
      vite:
        patterns:
          - vite
          - "@vitejs/*"
          - vite-plugin-*
      testing:
        patterns:
          - vitest
          - "@testing-library/*"
          - jsdom
          - "@playwright/test"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
