version: 2
updates:
  - package-ecosystem: cargo
    directory: /gomoku-bot-lab
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"

# npm updates remain manual because gomoku-web consumes the generated
# gomoku-wasm package through a local file dependency, which Dependabot cannot
# resolve in its update environment.
